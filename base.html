<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP JSP</title>

  <!-- Bootstrap + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #f5f6fa;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .navbar {
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
    }
    .card {
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(34,60,80,0.11);
    }
    .table th, .table td {
      vertical-align: middle;
    }
    .btn-primary, .btn-success, .btn-warning, .btn-danger {
      border-radius: 8px;
      font-weight: 600;
    }
    .form-label {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">ERP JSP</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link {% if '/clientes' in request.path %}active{% endif %}" href="/clientes">Clientes</a></li>
          <li class="nav-item"><a class="nav-link {% if 'fornecedores' in request.path %}active{% endif %}" href="/fornecedores">Fornecedores</a></li>
          <li class="nav-item"><a class="nav-link {% if 'produtos' in request.path %}active{% endif %}" href="/produtos">Produtos</a></li>
          <li class="nav-item"><a class="nav-link {% if 'servicos' in request.path %}active{% endif %}" href="/servicos">Serviços</a></li>
          <li class="nav-item"><a class="nav-link {% if 'tipos_servico' in request.path %}active{% endif %}" href="/tipos_servico">Tipos de Serviço</a></li>
          <li class="nav-item"><a class="nav-link {% if 'ordens_servico' in request.path %}active{% endif %}" href="/ordens_servico">Ordens de Serviço</a></li>
          <li class="nav-item"><a class="nav-link text-warning" href="/logout">Sair</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="container mb-4">
    {% block conteudo %}{% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Scripts Globais -->
  <script>
    // Máscara para CPF/CNPJ
    document.addEventListener('DOMContentLoaded', function () {
      const cpfCnpjInput = document.getElementById('cpf_cnpj');
      if (cpfCnpjInput) {
        cpfCnpjInput.addEventListener('input', function () {
          let v = this.value.replace(/\D/g, '');
          if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          } else {
            v = v.replace(/^(\d{2})(\d)/, "$1.$2");
            v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
            v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
            v = v.replace(/(\d{4})(\d)/, "$1-$2");
          }
          this.value = v;
        });
      }

      // Máscara para telefone
      const telInput = document.getElementById('telefone');
      if (telInput) {
        telInput.addEventListener('input', function () {
          let v = this.value.replace(/\D/g, '');
          if (v.length > 10) {
            v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
          } else if (v.length > 5) {
            v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
          } else if (v.length > 2) {
            v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
          } else {
            v = v.replace(/^(\d*)$/, "($1");
          }
          this.value = v;
        });
      }

      // Máscara para CEP
      const cepInput = document.getElementById('cep');
      if (cepInput) {
        cepInput.addEventListener('input', function () {
          let v = this.value.replace(/\D/g, '').slice(0, 8);
          if (v.length > 5) {
            this.value = v.slice(0, 5) + '-' + v.slice(5);
          } else {
            this.value = v;
          }
        });

        // Busca de endereço com ViaCEP
        cepInput.addEventListener('blur', function () {
          const cep = this.value.replace(/\D/g, '');
          if (cep.length === 8) {
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
              .then(response => response.json())
              .then(data => {
                if (!data.erro) {
                  const enderecoInput = document.getElementById('endereco');
                  if (enderecoInput) {
                    enderecoInput.value =
                      `${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}`;
                  }
                } else {
                  alert("CEP não encontrado.");
                }
              })
              .catch(() => alert("Erro ao buscar CEP."));
          }
        });
      }
    });
  </script>
</body>
</html>
