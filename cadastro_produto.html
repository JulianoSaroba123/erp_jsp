{% extends 'base.html' %}

{% block conteudo %}
<div class="container mt-5">
  <h2 class="mb-4 text-primary">Cadastro de Produto</h2>

  <form action="{{ url_for('cadastrar_produto') }}" method="POST">
    {% if produto %}
  <input type="hidden" name="id" value="{{ produto.id }}">
{% endif %}

    
    <!-- 1. Dados principais -->
    <div class="col-md-4">
      <label for="codigo" class="form-label">Código</label>
      <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Automático" value="{{ produto.codigo if produto else '' }}" readonly>
    </div>
    
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" class="form-control" id="nome" name="nome" value="{{ produto.nome if produto else '' }}" required>
      </div>
    </div>

    <!-- 2. Fornecedor -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="fornecedor_id" class="form-label">Fornecedor</label>
        <select name="fornecedor_id" id="fornecedor_id" class="form-select" required>
          <option value="">Selecione...</option>
          {% for f in fornecedores %}
            <option value="{{ f.id }}" {% if produto and produto.fornecedor_id == f.id %}selected{% endif %}>
              {{ f.nome }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- 3. Informações financeiras com cálculo automático -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label" for="valor_compra">Valor de Compra (R$)</label>
        <input type="number" step="0.01" id="valor_compra" name="valor_compra" class="form-control" value="{{ produto.valor_compra if produto else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="markup">Markup (%)</label>
        <input type="number" step="0.1" id="markup" name="markup_percentual" class="form-control" value="{{ produto.markup_percentual if produto else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="valor_venda">Valor de Venda (R$)</label>
        <input type="number" step="0.01" id="valor_venda" name="valor_venda" class="form-control" value="{{ produto.valor_venda if produto else '' }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label" for="lucro">Lucro (%)</label>
        <input type="number" step="0.1" id="lucro" name="lucro_percentual" class="form-control" value="{{ produto.lucro_percentual if produto else '' }}" readonly>
      </div>
    </div>

    <!-- 4. Estoque e outros -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label" for="estoque">Estoque</label>
        <input type="number" step="1" id="estoque" name="estoque" class="form-control" value="{{ produto.estoque if produto else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="unidade">Unidade</label>
        <input type="text" id="unidade" name="unidade" class="form-control" value="{{ produto.unidade if produto else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="classificacao">Classificação</label>
        <input type="text" id="classificacao" name="classificacao" class="form-control" value="{{ produto.classificacao if produto else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="localizacao">Localização</label>
        <input type="text" id="localizacao" name="localizacao" class="form-control" value="{{ produto.localizacao if produto else '' }}">
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label" for="situacao">Situação</label>
        <select id="situacao" name="situacao" class="form-select">
          <option value="ativo" {% if produto and produto.situacao == 'ativo' %}selected{% endif %}>Ativo</option>
          <option value="inativo" {% if produto and produto.situacao == 'inativo' %}selected{% endif %}>Inativo</option>
        </select>
      </div>
      <div class="col-md-5">
        <label class="form-label" for="fabricante">Fabricante</label>
        <input type="text" id="fabricante" name="fabricante" class="form-control" value="{{ produto.fabricante if produto else '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="numero_serie">Nº de Série</label>
        <input type="text" id="numero_serie" name="numero_serie" class="form-control" value="{{ produto.numero_serie if produto else '' }}">
      </div>
    </div>

    <!-- 5. Botões de ação -->
    <div class="d-flex justify-content-between mt-4">
      <a href="{{ url_for('listar_produtos') }}" class="btn btn-secondary">Voltar</a>
      <button type="submit" class="btn btn-success">
        {{ 'Atualizar' if produto else 'Salvar' }}
      </button>
    </div>
  </form>
</div>

<!-- SCRIPT de Cálculo Automático -->
<script>
function recalcularPrecificacao() {
  const vc = parseFloat(document.getElementById('valor_compra').value) || 0;
  const mk = parseFloat(document.getElementById('markup').value) || 0;

  const vv = vc * (1 + mk / 100);
  const lucro = vc > 0 ? ((vv - vc) / vc) * 100 : 0;

  document.getElementById('valor_venda').value = vv.toFixed(2);
  document.getElementById('lucro').value = lucro.toFixed(2);
}

document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('valor_compra').addEventListener('input', recalcularPrecificacao);
  document.getElementById('markup').addEventListener('input', recalcularPrecificacao);
  recalcularPrecificacao(); // já calcula se for edição
});
</script>
{% endblock %}
