{% extends "base.html" %}
{% block conteudo %}
<div class="card p-4 mt-4">
  <h3>{{ 'Editar' if fornecedor else 'Cadastro de' }} Fornecedor</h3>

  <form method="POST" id="formFornecedor">
    <!-- Linha 1 -->
    <div class="row">
      <div class="col-md-2 mb-3">
        <label class="form-label">Código</label>
        <input type="text" class="form-control" name="codigo" placeholder="Automático" value="{{ fornecedor.codigo if fornecedor else '' }}" readonly>
      </div>
      <div class="col-md-5 mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" name="nome" placeholder="Digite o nome" value="{{ fornecedor.nome if fornecedor else '' }}" required>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label">CNPJ</label>
        <input type="text" class="form-control" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required value="{{ fornecedor.cnpj if fornecedor else '' }}">
      </div>
      <div class="col-md-2 mb-3">
        <label class="form-label">Telefone</label>
        <input type="text" class="form-control" id="telefone" name="telefone" placeholder="Digite o contato" maxlength="15" required value="{{ fornecedor.telefone if fornecedor else '' }}">
      </div>
    </div>

    <!-- Linha 2 -->
    <div class="row">
      <div class="col-md-2 mb-3">
        <label class="form-label">CEP</label>
        <input type="text" class="form-control" id="cep" name="cep" placeholder="00000-000" maxlength="9" required value="{{ fornecedor.cep if fornecedor else '' }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Endereço</label>
        <input type="text" class="form-control" id="endereco" name="endereco" placeholder="Automático" required value="{{ fornecedor.endereco if fornecedor else '' }}">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Cidade</label>
        <input type="text" class="form-control" id="cidade" name="cidade" placeholder="Automático" required value="{{ fornecedor.cidade if fornecedor else '' }}">
      </div>
    </div>

    <!-- Botões -->
    <div class="d-flex justify-content-between">
      <a href="/fornecedores" class="btn btn-secondary">Cancelar</a>
      <!--<button type="submit" class="btn btn-success">Salvar</button> -->
      <button type="submit" class="btn btn-success">
        {{ 'Atualizar' if fornecedor else 'Salvar' }}
    </div>
  </form>
</div>

<!-- Scripts de máscara e busca de CEP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
  $(function () {
    // Máscaras
    $('#cnpj').mask('00.000.000/0000-00');
    $('#telefone').mask('(00) 00000-0000');
    $('#cep').mask('00000-000');

    // Busca CEP via ViaCEP
    $('#cep').on('blur', function () {
      let cep = $(this).val().replace(/\D/g, '');
      if (cep.length === 8) {
        $.getJSON(`https://viacep.com.br/ws/${cep}/json/`, function (data) {
          if (!data.erro) {
            $('#endereco').val(data.logradouro);
            $('#cidade').val(data.localidade);
          }
        });
      }
    });
  });
</script>
{% endblock %}
