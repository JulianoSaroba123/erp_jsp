{% extends 'base.html' %}

{% block content %}
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
.table-responsive table {
  width: 100%;
  table-layout: fixed;
}
.table-responsive th,
.table-responsive td {
  word-wrap: break-word;
  white-space: normal;
}
</style>
<div class="container mt-4">
  <div class="card shadow-sm p-4" style="max-width: 500px; margin:auto;">
    <h3 class="mb-4"><i class="bi bi-tag"></i> {{ 'Editar Tipo de Serviço' if tipo else 'Cadastro de Tipo de Serviço' }}</h3>
    <form method="POST" autocomplete="off">
      
      <div class="mb-3">
        <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="nome" name="nome" required value="{{ servico.nome if servico else '' }}">
      </div>
      <div class="d-flex justify-content-between mt-4">
       
        <a href="{{ url_for('lista_tipos_servico') }}" class="btn btn-secondary me-2">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
        {% if tipo %}
          <a href="{{ url_for('limpar_tipo_servico', id=tipo.id) }}" class="btn btn-info me-2">
            <i class="bi bi-eraser"></i> Limpar
          </a>
        {% else %}
          <a class="btn btn-info disabled me-2" style="pointer-events:none;opacity:0.5;">
            <i class="bi bi-eraser"></i> Limpar
          </a>
        {% endif %}
        <button type="submit" class="btn btn-success">
          <i class="bi bi-save"></i> {{ 'Atualizar' if tipo else 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
