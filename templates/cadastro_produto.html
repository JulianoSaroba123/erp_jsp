{% extends "base.html" %}
{% block conteudo %}
<div class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h3>Cadastro de Produto</h3>
    <form method="POST">
      <div class="row">
        <div class="col-md-2 mb-3">
          <label>Código</label>
          <input type="text" name="codigo" class="form-control" value="{{ produto.codigo if produto else '' }}" readonly>
        </div>
        <div class="col-md-4 mb-3">
          <label>Nome</label>
          <input type="text" name="nome" class="form-control" value="{{ produto.nome if produto else '' }}" required>
        </div>
        <div class="col-md-3 mb-3">
          <label>Código de Barras</label>
          <input type="text" name="codigo_barras" class="form-control" value="{{ produto.codigo_barras if produto else '' }}">
        </div>
        <div class="col-md-3 mb-3">
          <label>Data</label>
          <input type="date" name="data" class="form-control" value="{{ produto.data if produto and produto.data else '' }}">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label>Fornecedor</label>
          <div class="input-group">
            <select name="fornecedor" class="form-control" required>
              <option value="">Selecione</option>
              {% for f in fornecedores %}
                <option value="{{ f.nome }}" {% if produto and produto.fornecedor == f.nome %}selected{% endif %}>{{ f.nome }}</option>
              {% endfor %}
            </select>
            <a href="/fornecedor/novo" target="_blank" class="btn btn-outline-primary">+</a>
          </div>
        </div>
        <div class="col-md-2 mb-3">
          <label>Unidade</label>
          <input type="text" name="unidade" class="form-control" value="{{ produto.unidade if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Classificação</label>
          <input type="text" name="classificacao" class="form-control" value="{{ produto.classificacao if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Localização</label>
          <input type="text" name="localizacao" class="form-control" value="{{ produto.localizacao if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Situação</label>
          <select name="situacao" class="form-control">
            <option value="Ativo" {% if produto and produto.situacao == "Ativo" %}selected{% endif %}>Ativo</option>
            <option value="Inativo" {% if produto and produto.situacao == "Inativo" %}selected{% endif %}>Inativo</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-2 mb-3">
          <label>Valor Venda</label>
          <input type="number" name="valor_venda" step="0.01" class="form-control" value="{{ produto.valor_venda if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Valor Compra</label>
          <input type="number" name="valor_compra" step="0.01" class="form-control" value="{{ produto.valor_compra if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Estoque</label>
          <input type="number" name="estoque" class="form-control" value="{{ produto.estoque if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Lucro (%)</label>
          <input type="number" name="lucro" step="0.01" class="form-control" value="{{ produto.lucro if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Fabricante</label>
          <input type="text" name="fabricante" class="form-control" value="{{ produto.fabricante if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label>Nº de Série</label>
          <input type="text" name="numero_serie" class="form-control" value="{{ produto.numero_serie if produto else '' }}">
        </div>
      </div>

      <div class="d-flex justify-content-between">
        <a href="/produtos" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
