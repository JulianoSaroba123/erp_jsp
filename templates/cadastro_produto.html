{% extends 'base.html' %}
{% block conteudo %}
<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h3 class="mb-4">{{ 'Editar' if produto else 'Cadastro de' }} Produto</h3>
    <form method="POST">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="nome" class="form-label">Nome do Produto</label>
          <input type="text" class="form-control" id="nome" name="nome" required value="{{ produto.nome if produto else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label for="codigo_barras" class="form-label">Código de Barras</label>
          <input type="text" class="form-control" id="codigo_barras" name="codigo_barras" value="{{ produto.codigo_barras if produto else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label for="data" class="form-label">Data</label>
          <input type="date" class="form-control" id="data" name="data" value="{{ produto.data if produto and produto.data else '' }}">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="fornecedor" class="form-label">Fornecedor</label>
          <input type="text" class="form-control" id="fornecedor" name="fornecedor" value="{{ produto.fornecedor if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label for="unidade" class="form-label">Unidade</label>
          <input type="text" class="form-control" id="unidade" name="unidade" value="{{ produto.unidade if produto else '' }}">
        </div>
        <div class="col-md-3 mb-3">
          <label for="classificacao" class="form-label">Classificação</label>
          <input type="text" class="form-control" id="classificacao" name="classificacao" value="{{ produto.classificacao if produto else '' }}">
        </div>
        <div class="col-md-3 mb-3">
          <label for="localizacao" class="form-label">Localização</label>
          <input type="text" class="form-control" id="localizacao" name="localizacao" value="{{ produto.localizacao if produto else '' }}">
        </div>
      </div>

      <div class="row">
        <div class="col-md-2 mb-3">
          <label for="situacao" class="form-label">Situação</label>
          <select id="situacao" name="situacao" class="form-select">
            <option value="Ativo" {% if produto and produto.situacao == 'Ativo' %}selected{% endif %}>Ativo</option>
            <option value="Inativo" {% if produto and produto.situacao == 'Inativo' %}selected{% endif %}>Inativo</option>
          </select>
        </div>
        <div class="col-md-2 mb-3">
          <label for="valor_venda" class="form-label">Valor de Venda</label>
          <input type="number" step="0.01" class="form-control" id="valor_venda" name="valor_venda" value="{{ produto.valor_venda if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label for="valor_compra" class="form-label">Valor de Compra</label>
          <input type="number" step="0.01" class="form-control" id="valor_compra" name="valor_compra" value="{{ produto.valor_compra if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label for="estoque" class="form-label">Estoque</label>
          <input type="number" class="form-control" id="estoque" name="estoque" value="{{ produto.estoque if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label for="lucro" class="form-label">Lucro (%)</label>
          <input type="number" step="0.01" class="form-control" id="lucro" name="lucro" value="{{ produto.lucro if produto else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label for="fabricante" class="form-label">Fabricante</label>
          <input type="text" class="form-control" id="fabricante" name="fabricante" value="{{ produto.fabricante if produto else '' }}">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="numero_serie" class="form-label">Nº de Série</label>
          <input type="text" class="form-control" id="numero_serie" name="numero_serie" value="{{ produto.numero_serie if produto else '' }}">
        </div>
      </div>

      <div class="d-flex justify-content-between">
        <a href="/produtos" class="btn btn-secondary">Voltar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
