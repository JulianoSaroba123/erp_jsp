{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
  <h3>{{ 'Editar' if produto else 'Novo' }} Produto</h3>
  <form method="POST">
    <div class="mb-3">
      <label for="codigo">Código</label>
      <input type="text" name="codigo" id="codigo" class="form-control" required value="{{ produto.codigo if produto else '' }}">
    </div>
    <div class="mb-3">
      <label for="nome">Nome</label>
      <input type="text" name="nome" id="nome" class="form-control" required value="{{ produto.nome if produto else '' }}">
    </div>
    <div class="mb-3">
      <label for="preco">Preço</label>
      <input type="number" name="preco" id="preco" class="form-control" step="0.01" required value="{{ produto.preco if produto else '' }}">
    </div>
    <div class="mb-3">
      <label for="unidade">Unidade</label>
      <input type="text" name="unidade" id="unidade" class="form-control" required value="{{ produto.unidade if produto else '' }}">
    </div>
    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="/produtos" class="btn btn-secondary">Voltar</a>
  </form>
</div>

{% endblock %}
