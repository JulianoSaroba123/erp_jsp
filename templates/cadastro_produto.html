
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .form-section {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .form-header {
            background-color: #343a40;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="form-header">Cadastro de Produto</div>
    <form action="" method="POST" class="form-section">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Nome do Produto</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="form-group col-md-3">
                <label>Código de Barras</label>
                <input type="text" name="codigo_barras" class="form-control">
            </div>
            <div class="form-group col-md-3">
                <label>Data</label>
                <input type="date" name="data" class="form-control" value="{{ produto.data if produto else '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-4">
                <label>Fornecedor</label>
                <input type="text" name="fornecedor" class="form-control">
            </div>
            <div class="form-group col-md-2">
                <label>Unidade</label>
                <input type="text" name="unidade" class="form-control">
            </div>
            <div class="form-group col-md-3">
                <label>Classificação</label>
                <input type="text" name="classificacao" class="form-control">
            </div>
            <div class="form-group col-md-3">
                <label>Localização</label>
                <input type="text" name="localizacao" class="form-control">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-3">
                <label>Situação</label>
                <select name="situacao" class="form-control">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select>
            </div>
            <div class="form-group col-md-3">
                <label>Valor de Venda</label>
                <input type="number" name="valor_venda" step="0.01" class="form-control">
            </div>
            <div class="form-group col-md-3">
                <label>Valor de Compra</label>
                <input type="number" name="valor_compra" step="0.01" class="form-control">
            </div>
            <div class="form-group col-md-3">
                <label>Estoque</label>
                <input type="number" name="estoque" class="form-control">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-2">
                <label>Lucro (%)</label>
                <input type="number" name="lucro" step="0.01" class="form-control">
            </div>
            <div class="form-group col-md-5">
                <label>Fabricante</label>
                <input type="text" name="fabricante" class="form-control">
            </div>
            <div class="form-group col-md-5">
                <label>Nº de Série</label>
                <input type="text" name="numero_serie" class="form-control">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/produtos" class="btn btn-secondary">Voltar</a>
    </form>
</div>
</body>
</html>
