<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Configuração de codificação e título da página -->
    <meta charset="UTF-8">
    <title>Login - ERP JSP</title>

    <!-- Importa o CSS personalizado do projeto -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Importa o Bootstrap 5 via CDN para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <!-- Define um fundo claro -->

    <!-- Centraliza verticalmente e horizontalmente o card de login -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        
        <!-- Card com sombra para o formulário de login -->
        <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

            <!-- Título da tela de login -->
            <h4 class="text-centr mb-4">Acesso ao ERP JSP</h4>

            <!-- Exibe mensagem de erro, se houver -->
            {% if erro %}
            <div class="alert alert-danger text-center">
                {{ erro }}
            </div>
            {% endif %}

            <!-- Formulário de login -->
            <form method="POST">
                <!-- Campo de usuário -->
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" required>
                </div>

                <!-- Campo de senha -->
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" required>
                </div>

                <!-- Botão de envio do formulário -->
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>

</body>
</html>
