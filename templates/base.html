<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP JSP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

  <!-- Menu fixo no topo -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="/">ERP JSP</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Clientes</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if '/produtos' in request.path %}active{% endif %}" href="/produtos">Produtos</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if '/servicos' in request.path %}active{% endif %}" href="/servicos">Serviços</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-warning" href="/logout">Sair</a>
      </li>
    </ul>
  </div>
</nav>


  <!-- Conteúdo principal -->
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
