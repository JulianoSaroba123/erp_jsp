<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP JSP - Elétrica & Solar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/192x192.png">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3 mb-3 d-flex justify-content-between">
        <span class="navbar-brand">ERP JSP</span>
        {% if session.get('usuario') %}
            <a href="/logout" class="btn btn-outline-light btn-sm">Sair</a>
        {% endif %}
    </nav>

    <div class="container mb-5">
        {% block conteudo %}{% endblock %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js')
        }
    </script>
</body>
</html>
