<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP JSP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

  <!-- Menu fixo no topo -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">ERP JSP</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Clientes</a></li>
        <li class="nav-item"><a class="nav-link {% if 'produtos' in request.path %}active{% endif %}" href="/produtos">Produtos</a></li>
        <li class="nav-item"><a class="nav-link {% if 'servicos' in request.path %}active{% endif %}" href="/servicos">Serviços</a></li>
        <li class="nav-item">
  <a class="nav-link {% if 'fornecedores' in request.path %}active{% endif %}" href="/fornecedores">Fornecedores</a>
</li>
        <li class="nav-item"><a class="nav-link text-warning" href="/logout">Sair</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  {% block conteudo %}{% endblock %}
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
