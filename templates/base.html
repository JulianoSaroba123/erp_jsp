<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERP JSP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f5f6fa;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .sidebar {
      min-height: 100vh;
      background: #212529;
      color: #fff;
      padding-top: 1rem;
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      z-index: 1030;
    }
    .sidebar .nav-link {
      color: #fff;
      font-weight: 600;
      margin-bottom: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .sidebar .nav-link.active, .sidebar .nav-link:hover {
      background: #0d6efd;
      color: #fff;
    }
    .main-content {
      margin-left: 220px;
      padding: 0;
    }
    .topbar {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 0.75rem 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1020;
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
      color: #0d6efd;
      text-decoration: none;
    }
    .card {
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(34,60,80,0.11);
    }
    .table th, .table td {
      vertical-align: middle;
    }
    .btn-primary, .btn-success, .btn-warning, .btn-danger {
      border-radius: 8px;
      font-weight: 600;
    }
    .form-label {
      font-weight: 600;
    }
    @media (max-width: 991.98px) {
      .sidebar {
        position: static;
        width: 100%;
        min-height: auto;
        padding: 0.5rem 0;
      }
      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar d-flex flex-column p-3">
    <a href="/" class="navbar-brand mb-4">ERP JSP</a>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Clientes</a>
      </li>
      <li>
        <a class="nav-link {% if 'fornecedores' in request.path %}active{% endif %}" href="/fornecedores">Fornecedores</a>
      </li>
      <li>
        <a class="nav-link {% if 'produtos' in request.path %}active{% endif %}" href="/produtos">Produtos</a>
      </li>
      <li>
        <a class="nav-link {% if 'servicos' in request.path %}active{% endif %}" href="/servicos">Serviços</a>
      </li>
      <li>
        <a class="nav-link {% if 'tipos_servico' in request.path %}active{% endif %}" href="/tipos_servico">Tipos de Serviço</a>
      </li>
      <li>
        <a class="nav-link {% if 'ordens_servico' in request.path %}active{% endif %}" href="/ordens_servico">Ordens de Serviço</a>
      </li>
      <li>
        <a class="nav-link text-warning" href="/logout">Sair</a>
      </li>
    </ul>
  </div>

  <div class="main-content">
    <div class="topbar">
      <span class="fs-5 fw-bold">Painel ERP JSP</span>
      <span class="text-muted small">Usuário: {{ session.get('usuario', 'Não logado') }}</span>
    </div>
    <div class="container mb-4">
      {% block content %}{% endblock %}
      {% block conteudo %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
