
{% extends 'base.html' %}
{% block conteudo %}
<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h2 class="mb-4">{{ 'Editar Serviço' if servico else 'Novo Serviço' }}</h2>
    <form method="POST">
      <div class="form-group mb-3">
        <label for="nome">Nome do Serviço</label>
        <input type="text" class="form-control" id="nome" name="nome" required value="{{ servico.nome if servico else '' }}">
      </div>

      <div class="form-group mb-3">
        <label for="descricao">Descrição</label>
        <textarea class="form-control" id="descricao" name="descricao" rows="4">{{ servico.descricao if servico else '' }}</textarea>
      </div>

      <div class="form-group mb-4">
        <label for="valor">Valor</label>
        <input type="text" class="form-control" id="valor" name="valor" value="{{ servico.valor if servico else '' }}">
      </div>

      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="/servicos" class="btn btn-secondary">Voltar</a>
    </form>
  </div>
</div>
{% endblock %}
