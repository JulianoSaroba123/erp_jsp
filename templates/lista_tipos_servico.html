{% extends "base.html" %}
{% block conteudo %}
<div class="container mt-4">
  <h3>Lista de Tipos de Serviço</h3>
  <a href="/tipos_servico/novo" class="btn btn-primary mb-3">Novo Tipo de Serviço</a>
  <table class="table table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Código</th>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for t in tipos %}
      <tr>
        <td>{{ t.id }}</td>
        <td>{{ t.nome }}</td>
        <td>
          <a href="/tipos_servico/editar/{{ t.id }}" class="btn btn-warning btn-sm">Editar</a>
          <a href="/tipos_servico/excluir/{{ t.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Excluir?')">Excluir</a>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3" class="text-center">Nenhum tipo cadastrado.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
