
{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Lista de Serviços</h4>
    <a href="/servico/novo" class="btn btn-primary">Novo Serviço</a>
  </div>
  <div class="table-responsive">
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Código</th>
          <th>Nome</th>
          <th>Valor</th>
          <th>Unidade</th>
          <th>Situação</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for s in servicos %}
        <tr>
          <td>{{ s.codigo }}</td>
          <td>{{ s.nome }}</td>
          <td>R$ {{ "%.2f"|format(s.valor) }}</td>
          <td>{{ s.unidade }}</td>
          <td>{{ s.situacao }}</td>
          <td>
            <a href="/servico/editar/{{ s.id }}" class="btn btn-warning btn-sm">Editar</a>
            <a href="/servico/excluir/{{ s.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Confirmar exclusão?')">Excluir</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
