{% extends "base.html" %}
{% block content %}
<div class="card p-4 mt-4">
    <h3>{{ 'Editar' if os else 'Nova' }} Ordem de Serviço</h3>
    <form method="POST">
        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label">Código OS</label>
                <input type="text" class="form-control" name="codigo" value="{{ os.codigo if os else '' }}" readonly>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Cliente</label>
                <input type="text" class="form-control" name="cliente_id" value="{{ os.cliente_id if os else '' }}">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Data de Emissão</label>
                <input type="date" class="form-control" name="data_emissao" value="{{ os.data_emissao if os else '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" name="descricao" rows="3">{{ os.descricao if os else '' }}</textarea>
        </div>
        <div class="d-flex justify-content-between">
            <a href="/ordens_servico" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar</button>
        </div>
    </form>
</div>
{% endblock %}
