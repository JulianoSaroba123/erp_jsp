{% extends "base.html" %}
{% block conteudo %}
<style>
  /* ... seu CSS ... */
</style>
<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <h3 class="mb-4">{{ 'Editar Ordem de Serviço' if os else 'Nova Ordem de Serviço' }}</h3>
    <form method="POST" autocomplete="off">

      <!-- 1. Dados do Cliente -->
      <h5 class="mb-3 text-primary">1. Dados do Cliente</h5>
      <div class="row">
        <div class="col-md-6 mb-2 position-relative">
          <label>Cliente</label>
          <input type="text" name="cliente_nome" id="cliente_nome" class="form-control" value="{{ os.cliente_nome if os else '' }}" required autocomplete="off">
          <div id="cliente-lista" class="autocomplete-list"></div>
          <a href="/cadastro" target="_blank" class="btn btn-outline-primary btn-sm mt-1">Novo Cliente</a>
        </div>
        <div class="col-md-3 mb-2">
          <label>CPF/CNPJ</label>
          <input type="text" id="cliente_cpf_cnpj" name="cliente_cpf_cnpj" class="form-control" value="{{ os.cliente_cpf_cnpj if os else '' }}">
        </div>
        <div class="col-md-3 mb-2">
          <label>Telefone</label>
          <input type="text" id="cliente_telefone" name="cliente_telefone" class="form-control" value="{{ os.cliente_telefone if os else '' }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-2">
          <label>Email</label>
          <input type="email" id="cliente_email" name="cliente_email" class="form-control" value="{{ os.cliente_email if os else '' }}">
        </div>
        <div class="col-md-6 mb-2">
          <label>Endereço</label>
          <input type="text" id="cliente_endereco" name="cliente_endereco" class="form-control" value="{{ os.cliente_endereco if os else '' }}">
        </div>
      </div>

      <!-- 2. Detalhes da Ordem de Serviço -->
      <h5 class="mt-4 mb-3 text-primary">2. Detalhes da Ordem de Serviço</h5>
      <div class="row">
        <div class="col-md-2 mb-2">
          <label>Nº da OS</label>
          <input type="text" class="form-control" name="codigo" value="{{ os.codigo if os else '' }}" readonly>
        </div>
        <div class="col-md-2 mb-2">
          <label>Data Emissão</label>
          <input type="date" class="form-control" name="data_emissao" value="{{ os.data_emissao if os else '' }}">
        </div>
        <div class="col-md-2 mb-2">
          <label>Previsão de Conclusão</label>
          <input type="date" class="form-control" name="previsao_conclusao" value="{{ os.previsao_conclusao if os else '' }}">
        </div>
        <div class="col-md-6 mb-2">
          <label>Tipo de Serviço</label>
          <select class="form-select" name="tipo_servico" id="tipo_servico" required>
            <option value="">Selecione</option>
            {% for tipo in tipos_servico %}
              <option value="{{ tipo.nome }}" {% if os and os.tipo_servico == tipo.nome %}selected{% endif %}>{{ tipo.nome }}</option>
            {% endfor %}
          </select>
          <a href="/tipo_servico/novo" target="_blank" class="btn btn-outline-primary btn-sm mt-1">Novo Tipo de Serviço</a>
        </div>
      </div>
      <div class="row align-items-end">
        <div class="col-md-4 mb-2 position-relative">
          <label>Serviço</label>
          <input type="text" name="servico_nome" id="servico_nome" class="form-control" value="{{ os.servico_nome if os else '' }}" autocomplete="off">
          <div id="servico-lista" class="autocomplete-list-servico"></div>
          <a href="/servico/novo" target="_blank" class="btn btn-outline-primary btn-sm mt-1">Novo Serviço</a>
        </div>
        <div class="col-md-3 mb-2">
          <label>Descrição</label>
          <input type="text" id="descricao_servico" name="descricao_servico" class="form-control" value="{{ os.descricao_servico if os else '' }}">
        </div>
        <div class="col-md-2 mb-2">
          <label>Quantidade</label>
          <input type="number" id="qtd_servico" name="qtd_servico" class="form-control" min="1" value="{{ os.qtd_servico if os else '1' }}">
        </div>
        <div class="col-md-3 mb-2">
          <label>Valor Unitário</label>
          <input type="text" id="valor_unit_servico" name="valor_unit_servico" class="form-control" value="{{ os.valor_unit_servico if os else '' }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-2 mb-2">
          <label>Total de Horas</label>
          <input type="text" class="form-control" id="total_horas" name="total_horas" value="{{ os.total_horas if os else '' }}" readonly>
        </div>
        <div class="col-md-3 mb-2">
          <label>Valor do Serviço</label>
          <input type="text" class="form-control" id="valor_servicos" name="valor_servicos" value="{{ os.valor_servicos if os else '' }}" readonly>
        </div>
      </div>

      <!-- 3. Produtos/Peças Utilizadas -->
      <h5 class="mt-4 mb-3 text-primary">3. Produtos/Peças Utilizadas</h5>
      <div id="produtos-lista"></div>
      <button type="button" class="btn btn-outline-success btn-sm mb-3" onclick="adicionarProduto()">Adicionar Produto/Peça</button>
      <div class="row mb-2">
        <div class="col-md-3"><b>Total dos Produtos:</b> R$ <span id="total-produtos">0,00</span></div>
      </div>

      <!-- 4. Horas Trabalhadas -->
      <!-- ... resto igual ... -->

      <!-- (restante do seu template, scripts e tudo mais, permanece igual) -->

<script>
$(function(){
  // ... restante do seu script ...
  // Inicialização dos produtos em modo edição:
  {% if produtos_utilizados %}
    {% for prod in produtos_utilizados %}
      adicionarProduto(
        `{{ prod['nome']|e }}`,
        `{{ prod['qtde']|e }}`,
        `{{ prod['valor_unit']|e }}`
      );
    {% endfor %}
  {% endif %}
});
</script>

{% endblock %}
