{% extends 'base.html' %}
{% block conteudo %}
<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h3 class="mb-4">{{ 'Editar Fornecedor' if fornecedor else 'Novo Fornecedor' }}</h3>
    <form method="POST">
      <div class="row">
        <div class="col-md-3 mb-3">
          <label for="codigo" class="form-label">Código</label>
          <input type="text" class="form-control" id="codigo" name="codigo" required value="{{ fornecedor.codigo if fornecedor else '' }}">
        </div>
        <div class="col-md-9 mb-3">
          <label for="nome" class="form-label">Nome/Razão Social</label>
          <input type="text" class="form-control" id="nome" name="nome" required value="{{ fornecedor.nome if fornecedor else '' }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="cnpj" class="form-label">CNPJ</label>
          <input type="text" class="form-control" id="cnpj" name="cnpj" value="{{ fornecedor.cnpj if fornecedor else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label for="telefone" class="form-label">Telefone</label>
          <input type="text" class="form-control" id="telefone" name="telefone" value="{{ fornecedor.telefone if fornecedor else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" name="email" value="{{ fornecedor.email if fornecedor else '' }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-8 mb-3">
          <label for="endereco" class="form-label">Endereço</label>
          <input type="text" class="form-control" id="endereco" name="endereco" value="{{ fornecedor.endereco if fornecedor else '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label for="numero" class="form-label">Número</label>
          <input type="text" class="form-control" id="numero" name="numero" value="{{ fornecedor.numero if fornecedor else '' }}">
        </div>
      </div>
      <div class="d-flex justify-content-between">
        <a href="/fornecedores" class="btn btn-secondary">Voltar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
