{% extends "base.html" %}
{% block conteudo %}
<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <h3 class="mb-4">{{ 'Editar Cliente' if cliente else 'Cadastro de Cliente' }}</h3>
    <form method="POST" autocomplete="off">
      <div class="row">
        <div class="col-md-2 mb-3">
          <label class="form-label">Código</label>
          <input type="text" class="form-control" name="codigo" value="{{ cliente.codigo if cliente else '' }}" readonly>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" name="nome" value="{{ cliente.nome if cliente else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">CPF/CNPJ</label>
          <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj" value="{{ cliente.cpf_cnpj if cliente else '' }}" required>
        </div>
      </div>
      <div class="row">
        <div class="col-md-2 mb-3">
          <label class="form-label">CEP</label>
          <input type="text" class="form-control" id="cep" name="cep" maxlength="9" value="{{ cliente.cep if cliente else '' }}">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Endereço</label>
          <input type="text" class="form-control" id="endereco" name="endereco" value="{{ cliente.endereco if cliente else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">Número</label>
          <input type="text" class="form-control" name="numero" value="{{ cliente.numero if cliente else '' }}">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">Cidade</label>
          <input type="text" class="form-control" id="cidade" name="cidade" value="{{ cliente.cidade if cliente else '' }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-control" id="telefone" name="telefone" value="{{ cliente.telefone if cliente else '' }}">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" value="{{ cliente.email if cliente else '' }}">
        </div>
      </div>
      <div class="d-flex justify-content-between">
        <a href="/" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- jQuery, jQuery Mask e busca de CEP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$(function(){
  // Máscara inteligente para CPF/CNPJ
  $('#cpf_cnpj').on('input', function() {
    var val = $(this).val().replace(/\D/g, '');
    if (val.length <= 11) {
      $(this).mask('000.000.000-00');
    } else {
      $(this).mask('00.000.000/0000-00');
    }
  });
  // Máscara telefone
  $('#telefone').mask('(00) 00000-0000');
  // Máscara CEP
  $('#cep').mask('00000-000');

  // Busca automática de endereço via CEP
  $('#cep').on('blur', function(){
    let cep = $(this).val().replace(/\D/g, '');
    if (cep.length === 8) {
      $.getJSON('https://viacep.com.br/ws/' + cep + '/json/', function(data){
        if (!data.erro) {
          $('#endereco').val(data.logradouro);
          $('#cidade').val(data.localidade);
        }
      });
    }
  });
});
</script>
{% endblock %}
