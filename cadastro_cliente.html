{% extends "base.html" %}
{% block conteudo %}
<div class="card p-4 mt-4">
  <h3>{{ 'Editar' if cliente else 'Cadastro de' }} Cliente</h3>
    <form method="POST" id="form_cliente">
        {% if cliente %}
          <input type="hidden" name="id" value="{{ cliente.id }}">
        {% endif %}

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="codigo" class="form-label">Código do Cliente</label>
                <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Automático" value="{{ cliente.codigo if cliente else '' }}">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite o nome" value="{{ cliente.nome if cliente else '' }}">
            </div>
            
           <div class="col-md-3 mb-3">
                <label for="cpf_cnpj" class="form-label">CPF/CNPJ</label>
                <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj" placeholder="000.000.000-0000" value="{{ cliente.cpf_cnpj if cliente.cpf_cnpj else '' }}">
            </div>

            <div class="col-md-6">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="text" class="form-control" id="telefone" name="telefone" placeholder="Digite o contato" value="{{ cliente.telefone if cliente else '' }}">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Digite o e-mail" value="{{ cliente.email if cliente else '' }}">
            </div>

            <div class="col-md-3">
                <label for="cep" class="form-label">CEP</label>
                <input type="text" class="form-control" id="cep" name="cep" maxlength="9" placeholder="00000-000" value="{{ cliente.cep if cliente else '' }}">
            </div>

            <div class="col-md-3">
                <label for="numero" class="form-label">Número</label>
                <input type="text" class="form-control" id="numero" name="numero" placeholder="Digite o número"  value="{{ cliente.numero if cliente else '' }}">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-12">
                <label for="endereco" class="form-label">Endereço</label>
                <input type="text" class="form-control" id="endereco" name="endereco" placeholder="Digite o endereço" value="{{ cliente.endereco if cliente else '' }}">
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">
        {{ 'Atualizar' if cliente else 'Salvar' }}
        </div>
    </form>
</div>

<!-- Scripts de formatação -->
<script>
  document.getElementById('cpf_cnpj').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '');
    if (v.length <= 11) {
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    } else {
      v = v.replace(/^(\d{2})(\d)/, "$1.$2");
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
      v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
      v = v.replace(/(\d{4})(\d)/, "$1-$2");
    }
    this.value = v;
  });

  document.getElementById('telefone').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '');
    if (v.length > 10) {
      v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
    } else if (v.length > 5) {
      v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
    } else if (v.length > 2) {
      v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
    } else {
      v = v.replace(/^(\d*)$/, "($1");
    }
    this.value = v;
  });
</script>
{% endblock %}
