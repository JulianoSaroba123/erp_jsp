{% extends "base.html" %}

{% block conteudo %}
<style>
.tabela-tipo_servico {
  overflow-x: auto;
}
</style>

<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Lista de Tipos de Serviço</h3>
    </div>
    <div class="mb-3 d-flex justify-content-between">
<a href="/tipo_servico/novo" class="btn btn-primary mb-3">Novo Tipo de Serviço</a>
    </div>
  <!-- Botão para adicionar novo tipo de serviço -->
  

  <!-- Tabela com os tipos de serviço -->
 <div class="card shadow-sm">
    <div class="card-body tabela-tipo-servico">
      <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
      <tr>
        <th scope="col">Código</th> <!-- ID do tipo de serviço -->
        <th scope="col">Nome</th>   <!-- Nome do tipo de serviço -->
       <th class="text-center">Ações</th>
      </tr>
    </thead>

    <!-- Corpo da tabela com dados dinâmicos -->
    <tbody>
      {% for t in tipos %}
      <tr>
        <td>{{ t.id }}</td>     <!-- Código -->
        <td>{{ t.nome }}</td>   <!-- Nome -->
        <td class="text-center">
          <!-- Botão de edição -->
          <a href="/tipo_servico/editar/{{ t.id }}" class="btn btn-warning btn-sm">Editar</a>

          <!-- Botão de exclusão com confirmação -->
          <a href="/tipo_servico/excluir/{{ t.id }}" class="btn btn-danger btn-sm"
             onclick="return confirm('Excluir este tipo de serviço?')">Excluir</a>
        </td>
      </tr>
      {% else %}
      <!-- Caso não existam tipos cadastrados -->
      <tr>
        <td colspan="3" class="text-center">Nenhum tipo cadastrado.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>
{% endblock %}
